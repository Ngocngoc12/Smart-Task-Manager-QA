name: Task Manager QA CI

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Lay code ve may ao
      uses: actions/checkout@v4

    - name: Cai dat Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cai dat Google Chrome cho may ao
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Cai dat thu vien kiem thu (Pytest, Selenium, Requests)
      run: |
        python -m pip install --upgrade pip
        pip install pytest selenium webdriver-manager requests

    - name: Chay toan bo Test Case (API & Mobile UI)
      run: |
        pytest -v -s